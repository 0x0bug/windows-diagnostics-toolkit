name: PowerShell Validation

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Validate with PowerShell 7
        shell: pwsh
        run: .\scripts\validate.ps1

      - name: Validate with Windows PowerShell 5.1
        shell: powershell
        run: .\scripts\validate.ps1

      - name: Test findings with PowerShell 7
        shell: pwsh
        run: .\tests\report-common.tests.ps1

      - name: Test findings with Windows PowerShell 5.1
        shell: powershell
        run: .\tests\report-common.tests.ps1

      - name: Test Privacy Mode with PowerShell 7
        shell: pwsh
        run: .\tests\privacy-mode.tests.ps1

      - name: Test Privacy Mode with Windows PowerShell 5.1
        shell: powershell
        run: .\tests\privacy-mode.tests.ps1

      - name: Test Security Posture with PowerShell 7
        shell: pwsh
        run: .\tests\security-posture.tests.ps1

      - name: Test Security Posture with Windows PowerShell 5.1
        shell: powershell
        run: .\tests\security-posture.tests.ps1

      - name: Test Performance Snapshot with PowerShell 7
        shell: pwsh
        run: .\tests\performance-snapshot.tests.ps1

      - name: Test Performance Snapshot with Windows PowerShell 5.1
        shell: powershell
        run: .\tests\performance-snapshot.tests.ps1

      - name: Test Crash and Hang Diagnostics with PowerShell 7
        shell: pwsh
        run: .\tests\crash-hang-diagnostics.tests.ps1

      - name: Test Crash and Hang Diagnostics with Windows PowerShell 5.1
        shell: powershell
        run: .\tests\crash-hang-diagnostics.tests.ps1

      - name: Test Time Sync Diagnostics with PowerShell 7
        shell: pwsh
        run: .\tests\time-sync-diagnostics.tests.ps1

      - name: Test Time Sync Diagnostics with Windows PowerShell 5.1
        shell: powershell
        run: .\tests\time-sync-diagnostics.tests.ps1

      - name: Test validation AST policy with PowerShell 7
        shell: pwsh
        run: .\tests\validate-ast.tests.ps1

      - name: Test validation AST policy with Windows PowerShell 5.1
        shell: powershell
        run: .\tests\validate-ast.tests.ps1

      - name: Test interactive TUI with PowerShell 7
        shell: pwsh
        run: .\tests\tui.tests.ps1

      - name: Test interactive TUI with Windows PowerShell 5.1
        shell: powershell
        run: .\tests\tui.tests.ps1

      - name: Test live report smoke with PowerShell 7
        shell: pwsh
        run: .\tests\report-smoke.tests.ps1

      - name: Test live report smoke with Windows PowerShell 5.1
        shell: powershell
        run: .\tests\report-smoke.tests.ps1

      - name: Test README launches with PowerShell 7
        shell: pwsh
        run: .\tests\readme.tests.ps1

      - name: Test README launches with Windows PowerShell 5.1
        shell: powershell
        run: .\tests\readme.tests.ps1

      - name: Test Network Context with PowerShell 7
        shell: pwsh
        run: .\tests\network-context.tests.ps1

      - name: Test Network Context with Windows PowerShell 5.1
        shell: powershell
        run: .\tests\network-context.tests.ps1

      - name: Test module registry with PowerShell 7
        shell: pwsh
        run: .\tests\module-registry.tests.ps1

      - name: Test module registry with Windows PowerShell 5.1
        shell: powershell
        run: .\tests\module-registry.tests.ps1

      - name: Test module compatibility with PowerShell 7
        shell: pwsh
        run: .\tests\module-compatibility.tests.ps1

      - name: Test module compatibility with Windows PowerShell 5.1
        shell: powershell
        run: .\tests\module-compatibility.tests.ps1

      - name: Test module parsers with PowerShell 7
        shell: pwsh
        run: .\tests\module-parser.tests.ps1

      - name: Test module parsers with Windows PowerShell 5.1
        shell: powershell
        run: .\tests\module-parser.tests.ps1

      - name: Test diagnostic classification with PowerShell 7
        shell: pwsh
        run: .\tests\diagnostic-classification.tests.ps1

      - name: Test diagnostic classification with Windows PowerShell 5.1
        shell: powershell
        run: .\tests\diagnostic-classification.tests.ps1

      - name: Test process runner with PowerShell 7
        shell: pwsh
        run: .\tests\process-runner.tests.ps1

      - name: Test process runner with Windows PowerShell 5.1
        shell: powershell
        run: .\tests\process-runner.tests.ps1

      - name: Test startup inventory with PowerShell 7
        shell: pwsh
        run: .\tests\startup-inventory.tests.ps1

      - name: Test startup inventory with Windows PowerShell 5.1
        shell: powershell
        run: .\tests\startup-inventory.tests.ps1

      - name: Validate static site SEO with PowerShell 7
        shell: pwsh
        run: .\tests\site-seo.tests.ps1

      - name: Validate static site SEO with Windows PowerShell 5.1
        shell: powershell
        run: .\tests\site-seo.tests.ps1

      - name: Test bootstrap synchronization with PowerShell 7
        shell: pwsh
        run: .\tests\bootstrap-sync.tests.ps1

      - name: Test bootstrap synchronization with Windows PowerShell 5.1
        shell: powershell
        run: .\tests\bootstrap-sync.tests.ps1

      - name: Test release delivery with PowerShell 7
        shell: pwsh
        run: .\tests\release.tests.ps1

      - name: Test release delivery with Windows PowerShell 5.1
        shell: powershell
        run: .\tests\release.tests.ps1

      - name: Smoke test System report
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $outputDirectory = Join-Path -Path $env:RUNNER_TEMP -ChildPath ('wdt-smoke-' + [guid]::NewGuid().ToString('N'))
          New-Item -ItemType Directory -Path $outputDirectory -Force | Out-Null

          .\Invoke-WindowsDiagnostics.ps1 -System -OutputDirectory $outputDirectory

          $reports = @(Get-ChildItem -LiteralPath $outputDirectory -Filter 'WindowsDiagnosticsReport-*.txt' -File)
          if ($reports.Count -lt 1) {
            throw 'Smoke test did not create a TXT report.'
          }
