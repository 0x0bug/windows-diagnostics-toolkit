name: PowerShell Validation

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate with PowerShell 7
        shell: pwsh
        run: .\scripts\validate.ps1

      - name: Validate with Windows PowerShell 5.1
        shell: powershell
        run: .\scripts\validate.ps1

      - name: Test findings with PowerShell 7
        shell: pwsh
        run: .\tests\report-common.tests.ps1

      - name: Test findings with Windows PowerShell 5.1
        shell: powershell
        run: .\tests\report-common.tests.ps1

      - name: Test Privacy Mode with PowerShell 7
        shell: pwsh
        run: .\tests\privacy-mode.tests.ps1

      - name: Test Privacy Mode with Windows PowerShell 5.1
        shell: powershell
        run: .\tests\privacy-mode.tests.ps1

      - name: Test Security Posture with PowerShell 7
        shell: pwsh
        run: .\tests\security-posture.tests.ps1

      - name: Test Security Posture with Windows PowerShell 5.1
        shell: powershell
        run: .\tests\security-posture.tests.ps1

      - name: Test Performance Snapshot with PowerShell 7
        shell: pwsh
        run: .\tests\performance-snapshot.tests.ps1

      - name: Test Performance Snapshot with Windows PowerShell 5.1
        shell: powershell
        run: .\tests\performance-snapshot.tests.ps1

      - name: Test Crash and Hang Diagnostics with PowerShell 7
        shell: pwsh
        run: .\tests\crash-hang-diagnostics.tests.ps1

      - name: Test Crash and Hang Diagnostics with Windows PowerShell 5.1
        shell: powershell
        run: .\tests\crash-hang-diagnostics.tests.ps1

      - name: Test Time Sync Diagnostics with PowerShell 7
        shell: pwsh
        run: .\tests\time-sync-diagnostics.tests.ps1

      - name: Test Time Sync Diagnostics with Windows PowerShell 5.1
        shell: powershell
        run: .\tests\time-sync-diagnostics.tests.ps1

      - name: Test validation AST policy with PowerShell 7
        shell: pwsh
        run: .\tests\validate-ast.tests.ps1

      - name: Test validation AST policy with Windows PowerShell 5.1
        shell: powershell
        run: .\tests\validate-ast.tests.ps1

      - name: Test interactive TUI with PowerShell 7
        shell: pwsh
        run: .\tests\tui.tests.ps1

      - name: Test interactive TUI with Windows PowerShell 5.1
        shell: powershell
        run: .\tests\tui.tests.ps1

      - name: Test Network Context with PowerShell 7
        shell: pwsh
        run: .\tests\network-context.tests.ps1

      - name: Test Network Context with Windows PowerShell 5.1
        shell: powershell
        run: .\tests\network-context.tests.ps1

      - name: Validate static site SEO with PowerShell 7
        shell: pwsh
        run: .\tests\site-seo.tests.ps1

      - name: Validate static site SEO with Windows PowerShell 5.1
        shell: powershell
        run: .\tests\site-seo.tests.ps1

      - name: Smoke test System report
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $outputDirectory = Join-Path -Path $env:RUNNER_TEMP -ChildPath ('wdt-smoke-' + [guid]::NewGuid().ToString('N'))
          New-Item -ItemType Directory -Path $outputDirectory -Force | Out-Null

          .\Invoke-WindowsDiagnostics.ps1 -System -OutputDirectory $outputDirectory

          $reports = @(Get-ChildItem -LiteralPath $outputDirectory -Filter 'WindowsDiagnosticsReport-*.txt' -File)
          if ($reports.Count -lt 1) {
            throw 'Smoke test did not create a TXT report.'
          }
